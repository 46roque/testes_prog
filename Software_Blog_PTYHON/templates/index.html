{% extends "base.html" %}

{% block content %}
<h2>Últimos Posts</h2>

<div class="posts">
    {% for post in posts %}
        <div class="card">
            <h3>{{ post.titulo }}</h3>
            <p>{{ post.conteudo[:100] }}...</p>
            <a href="/post/{{ post.id }}">Ler mais</a>
        </div>
    {% endfor %}
</div>
{% endblock %}
